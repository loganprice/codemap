name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release Binaries
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Deno
      uses: denoland/setup-deno@v2
      with:
        deno-version: v2.x

    - name: Preinstall NPM dependencies for Deno cache
      run: npm ci

    - name: Compile Linux x64 Binary
      run: deno compile --node-modules-dir=none --allow-read --allow-write --allow-sys --allow-env --allow-net --target x86_64-unknown-linux-gnu --output code-survey-linux-x64 bin/code-survey.ts

    - name: Compile Windows x64 Binary
      run: deno compile --node-modules-dir=none --allow-read --allow-write --allow-sys --allow-env --allow-net --target x86_64-pc-windows-msvc --output code-survey-windows-x64.exe bin/code-survey.ts

    - name: Compile macOS Intel Binary
      run: deno compile --node-modules-dir=none --allow-read --allow-write --allow-sys --allow-env --allow-net --target x86_64-apple-darwin --output code-survey-macos-x64 bin/code-survey.ts

    - name: Compile macOS ARM64 Binary
      run: deno compile --node-modules-dir=none --allow-read --allow-write --allow-sys --allow-env --allow-net --target aarch64-apple-darwin --output code-survey-macos-arm64 bin/code-survey.ts

    - name: Create GitHub Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          code-survey-linux-x64
          code-survey-windows-x64.exe
          code-survey-macos-x64
          code-survey-macos-arm64
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js (for NPM publish)
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Setup Bun (for building package)
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Build and Publish to NPM
      run: |
        npm install -g npm@11.18.0
        npm publish --provenance

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix=sha-
          type=raw,value=latest

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

